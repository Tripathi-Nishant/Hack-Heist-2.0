services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - PORT=8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DB_HOST=${DB_HOST:-}
      - DB_NAME=${DB_NAME:-driftwatch}
      - DB_USER=${DB_USER:-driftwatch_admin}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_PORT=${DB_PORT:-5432}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - EC2_PUBLIC_IP=${EC2_PUBLIC_IP:-localhost}
      - S3_DATA_BUCKET=${S3_DATA_BUCKET:-}
      - SNS_TOPIC_ARN=${SNS_TOPIC_ARN:-}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - PSI_WARNING_THRESHOLD=${PSI_WARNING_THRESHOLD:-0.10}
      - PSI_CRITICAL_THRESHOLD=${PSI_CRITICAL_THRESHOLD:-0.20}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  model_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/model_server.py"]
    ports:
      - "8011:8011"
    environment:
      - API_URL=http://backend:8000/api/v1/check
      - BATCH_SIZE=20
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default:
    name: driftwatch-net